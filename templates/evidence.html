<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RakshakAI — Evidence Viewer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: #0a0a0a;
        color: white;
        padding: 20px;
      }
      .header {
        text-align: center;
        margin-bottom: 30px;
      }
      .header h1 {
        font-size: 28px;
        color: #00ff88;
      }
      .header p {
        font-size: 13px;
        color: #555;
        margin-top: 5px;
      }
      .count-badge {
        background: #00ff8822;
        border: 1px solid #00ff88;
        color: #00ff88;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        margin-top: 8px;
        display: inline-block;
      }
      .back-btn {
        display: block;
        text-align: center;
        margin-bottom: 24px;
        color: #00ff88;
        text-decoration: none;
        font-size: 14px;
      }
      .evidence-card {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 16px;
        margin-bottom: 20px;
        overflow: hidden;
      }
      .video-wrapper {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #000;
        overflow: hidden;
      }
      .video-wrapper video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      .evidence-details {
        padding: 14px 16px;
      }
      .evidence-badge {
        display: inline-block;
        background: #ff000022;
        border: 1px solid #ff4444;
        color: #ff4444;
        font-size: 11px;
        padding: 2px 10px;
        border-radius: 20px;
        margin-bottom: 10px;
      }
      .evidence-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0;
        font-size: 13px;
        color: #aaa;
      }
      .evidence-row span {
        color: #00ff88;
        font-weight: bold;
      }
      .no-evidence {
        text-align: center;
        color: #555;
        font-size: 16px;
        margin-top: 50px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>🛡️ Evidence Viewer</h1>
      <p>All captured evidence files</p>
      <span class="count-badge" id="countBadge">Loading...</span>
    </div>

    <a href="/" class="back-btn">← Back to RakshakAI</a>

    <div id="evidenceList">
      <p class="no-evidence">Loading evidence...</p>
    </div>

    <script>
      fetch("/list_evidence")
        .then((res) => res.json())
        .then((data) => {
          const list = document.getElementById("evidenceList");
          const files = data.files.filter((f) => f.endsWith(".webm"));

          document.getElementById("countBadge").textContent =
            `${files.length} Evidence Files`;

          if (files.length === 0) {
            list.innerHTML =
              '<p class="no-evidence">No evidence captured yet.</p>';
            return;
          }

          list.innerHTML = "";
          files.reverse().forEach((file, index) => {
            const raw = file.replace("evidence_", "").replace(".webm", "");
            const year = raw.substring(0, 4);
            const month = raw.substring(4, 6);
            const day = raw.substring(6, 8);
            const hour = raw.substring(9, 11);
            const min = raw.substring(11, 13);
            const sec = raw.substring(13, 15);
            const formattedTime = `${day}/${month}/${year} ${hour}:${min}:${sec}`;

            const card = document.createElement("div");
            card.className = "evidence-card";
            card.innerHTML = `
              <div class="video-wrapper">
                <video controls src="/evidence/${file}"></video>
              </div>
              <div class="evidence-details">
                <div class="evidence-badge">🚨 Evidence #${files.length - index}</div>
                <div class="evidence-row">🕐 Time: <span>${formattedTime}</span></div>
                <div class="evidence-row">📍 Location: <span id="loc-${index}">Fetching...</span></div>
                <div class="evidence-row">📁 File: <span>${file}</span></div>
              </div>
            `;
            list.appendChild(card);

            // Location fetch करा
            fetch(`/get_location/${file}`)
              .then((res) => res.json())
              .then((locData) => {
                document.getElementById(`loc-${index}`).textContent =
                  locData.location || "Unknown";
              })
              .catch(() => {
                document.getElementById(`loc-${index}`).textContent = "Unknown";
              });
          });
        })
        .catch(() => {
          document.getElementById("evidenceList").innerHTML =
            '<p class="no-evidence">Error loading evidence.</p>';
        });
    </script>
  </body>
</html>
